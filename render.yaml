services:
  - type: web
    name: studium
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        value: "file:./dev.db"
      - key: PORT
        value: 10000
      # Optional. Set in the Render dashboard, not in this file.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MENTOR_MODEL
        value: claude-haiku-4-5-20251001
      - key: BLS_API_KEY
        sync: false
